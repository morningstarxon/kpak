<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpak: 404</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&family=Special+Elite&display=swap');

        @font-face {
            font-family: 'Alice-RA';
            src: url('fonts/Alice-RA.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        :root { 
            --gold: #d4af37; 
            --dark-gold: #aa8a2e;
            --bg: #fafafa; 
            --text-main: #1a1a1a;
            --text-muted: #9ca3af;
            --text-light: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Alice-RA', 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .gold-serif { 
            font-family: 'Playfair Display', serif; 
        }

        .signature { 
            font-family: 'Special Elite', cursive; 
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa8a2e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            width: 100%;
            max-width: 36rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .error-card {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 4rem;
            border-radius: 2rem;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 6rem;
            margin-bottom: 0.5rem;
        }

        .status-label {
            color: var(--text-muted);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
        }

        .divider {
            height: 1px;
            width: 40px;
            background: var(--gold);
            margin: 2rem auto;
        }

        .message {
            color: var(--text-light);
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        .btn-gold {
            display: inline-block;
            background: white;
            border: 1px solid var(--gold);
            color: var(--dark-gold);
            padding: 0.75rem 2.5rem;
            border-radius: 9999px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background: var(--gold);
            color: white;
            transform: translateY(-1px);
        }

        footer {
            margin-top: 3rem;
            text-align: center;
        }

        .footer-sig {
            font-size: 1.25rem;
            color: #d1d5db;
            transition: color 0.3s ease;
            cursor: default;
        }

        .footer-sig:hover {
            color: var(--gold);
        }

        @media (max-width: 768px) {
            .error-card {
                padding: 3rem 2rem;
            }
            h1 {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="error-card">
            <h1 class="gold-serif gold-gradient-text">404</h1>
            
            <p class="status-label">Page Not Found</p>
            
            <div class="divider"></div>
            
            <p class="message">
                The requested URL was not found on this server.
            </p>

            <a href="https://morningstarxon.github.io/kpak/" class="btn-gold">
                Go Back
            </a>
        </div>
    </main>

    <footer>
        <p class="signature footer-sig">Morgenstern</p>
    </footer>

</body>
</html>
